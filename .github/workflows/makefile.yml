name: Terraform CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.7"
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  hamer_cloud-plan:
    runs-on: ubuntu-latest
    needs: lint
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    defaults:
      run:
        working-directory: websites
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.7"
      - name: Configure AWS Profile
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << 'CREDS'
          [hamer]
          aws_access_key_id = placeholder
          aws_secret_access_key = placeholder
          CREDS
          cat > ~/.aws/config << 'CONF'
          [profile hamer]
          region = us-east-1
          CONF
          sed -i "s|aws_access_key_id = placeholder|aws_access_key_id = ${AWS_ACCESS_KEY_ID}|" ~/.aws/credentials
          sed -i "s|aws_secret_access_key = placeholder|aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}|" ~/.aws/credentials
      - name: Terraform Init
        run: terraform init
      - name: Select Workspace
        run: terraform workspace select hamer || terraform workspace new hamer
      - name: Terraform Plan
        run: terraform plan -no-color

  hamer_cloud-apply:
    runs-on: ubuntu-latest
    needs: hamer_cloud-plan
    environment: hamercloud
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    defaults:
      run:
        working-directory: websites
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.7"
      - name: Configure AWS Profile
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << 'CREDS'
          [hamer]
          aws_access_key_id = placeholder
          aws_secret_access_key = placeholder
          CREDS
          cat > ~/.aws/config << 'CONF'
          [profile hamer]
          region = us-east-1
          CONF
          sed -i "s|aws_access_key_id = placeholder|aws_access_key_id = ${AWS_ACCESS_KEY_ID}|" ~/.aws/credentials
          sed -i "s|aws_secret_access_key = placeholder|aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}|" ~/.aws/credentials
      - name: Terraform Init
        run: terraform init
      - name: Select Workspace
        run: terraform workspace select hamer || terraform workspace new hamer
      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color

  ThomasHamerVPC-plan:
    runs-on: ubuntu-latest
    needs: lint
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    defaults:
      run:
        working-directory: vpc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.7"
      - name: Configure AWS Profile
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << 'CREDS'
          [hamer]
          aws_access_key_id = placeholder
          aws_secret_access_key = placeholder
          CREDS
          cat > ~/.aws/config << 'CONF'
          [profile hamer]
          region = us-east-1
          CONF
          sed -i "s|aws_access_key_id = placeholder|aws_access_key_id = ${AWS_ACCESS_KEY_ID}|" ~/.aws/credentials
          sed -i "s|aws_secret_access_key = placeholder|aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}|" ~/.aws/credentials
      - name: Terraform Init
        run: terraform init
      - name: Select Workspace
        run: terraform workspace select prod || terraform workspace new prod
      - name: Terraform Plan
        run: terraform plan -no-color

  ThomasHamerVPC-apply:
    runs-on: ubuntu-latest
    needs: ThomasHamerVPC-plan
    environment: thomashamer_vpc
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    defaults:
      run:
        working-directory: vpc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.7"
      - name: Configure AWS Profile
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << 'CREDS'
          [hamer]
          aws_access_key_id = placeholder
          aws_secret_access_key = placeholder
          CREDS
          cat > ~/.aws/config << 'CONF'
          [profile hamer]
          region = us-east-1
          CONF
          sed -i "s|aws_access_key_id = placeholder|aws_access_key_id = ${AWS_ACCESS_KEY_ID}|" ~/.aws/credentials
          sed -i "s|aws_secret_access_key = placeholder|aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}|" ~/.aws/credentials
      - name: Terraform Init
        run: terraform init
      - name: Select Workspace
        run: terraform workspace select prod || terraform workspace new prod
      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
